# The SSH options are passed verbatim to paramiko; see
# https://www.paramiko.org/ This is common CIJOE infrastructure
#
# Used by: cijoe.run() / cijoe.get() / cijoe.put()
[cijoe.transport.qemu_guest]
hostname = "localhost"
port = 4200
username = "root"
password = ""

[cijoe.run]
shell = "csh"

[cijoe.workflow]
fail_fast=true

[build.compiler]
bin = "clang"

[os]
name = "freebsd"
prettyname = "FreeBSD"
version = "14"

# Used by: the qemu.*.py scripts
[qemu]
img_bin = "qemu-img"
default_guest = "generic-bios-kvm-x86_64"
default_systemimage = "freebsd-14-x86_64"

# Used by: qemu.build.py
[qemu.build]
prefix = "{{ local.env.HOME }}/opt/qemu"

[qemu.systems.x86_64]
bin = "/opt/qemu/bin/qemu-system-x86_64"

# Used by: qemu.guest_initialize.py, qemu.guest_start.py, and qemu.guest_kill.py
[qemu.guests.generic-bios-kvm-x86_64]
path = "{{ local.env.HOME }}/guests/generic-bios-kvm-x86_64"

# Label of the qemu-system emulerator to use; see "qemu.systems"
system_label = "x86_64"

# Keyword arguments: joined onto the form: "-cpu host -smp 4 -m 4" etc.
system_args.kwa = {cpu = "host", smp = 6, m = "32G", accel = "kvm"}

# Raw arguments: passed without modification to qemu-system-{arch}
system_args.raw = """\
-M "type=q35,kernel_irqchip=split" \
-device pcie-root-port,id=rp_nvme,chassis=2,slot=2 \
-device vfio-pci,host=0000:02:00.0,bus=rp_nvme
"""

# Managed arguments: expands into longer incantations
system_args.tcp_forward = {host = 4200, guest = 22}
#system_args.host_share = "{{ local.env.HOME }}/git"

[xnvme.repository]
remote = "https://github.com/xnvme/xnvme.git"
path = "/root/git/xnvme"
branch = "next"

[xnvme.repository.sync]
branch = "wip"
remote_alias = "guest"
remote_path = "/tmp/xnvme"

[xnvme.build]
type = "debug"

[liburing.repository]
remote = "https://github.com/axboe/liburing.git"
path = "/root/git/liburing"
tag = "liburing-2.4"

[spdk.repository]
remote = "https://github.com/spdk/spdk"
path = "/root/git/spdk"
tag = "v24.05"

[spdk.build]
prefix = "/opt/spdk"
spdk_json_conf = "/opt/bdev_confs/bdev_nvme_spdk_nvme__1.conf"
filename = "bdev_nvme_spdk_nvme_device0n1n1"

[fio]
bin = "/opt/fio/bin/fio"

[fio.repository]
remote = "https://github.com/axboe/fio.git"
path = "/root/git/fio"
tag = "fio-3.38"

[fio.build]
prefix = "/opt/fio"

[fio.engines]
posixaio = {type = "builtin", group = "posixaio", device = "bdev"} # Kernel

null = {type = "builtin", group = "null", device = "bdev"}

spdk_nvme = {type = "external_preload", group = "spdk", path = "/tmp/spdk/build/fio/spdk_nvme", device = "pcie"} # Userspace
spdk_bdev = {type = "external_preload", group = "spdk", path = "/tmp/spdk/build/fio/spdk_bdev", device = "pcie"} # Userspace

xnvme_kqueue = {type = "builtin", group = "posixaio", be = "fbsd", async = "kqueue", device = "bdev"} # Kernel
xnvme_posixaio = {type = "builtin", group = "posixaio", be = "fbsd", async = "posix", device = "bdev"} # Kernel
xnvme_spdk = {type = "builtin", group = "spdk", be = "spdk", async = "nvme", device = "pcie"} # Userspace
xnvme_null = {type = "builtin", group = "null", be = "fbsd", async = "nil", device = "bdev"} # Kernel

[[devices]] # OS Managed
key = "bdev"
uri = "/dev/nvme0ns1"
nsid = 1
labels = ["dev", "bdev", "nvm"]
driver_attachment = "kernel"

[[devices]] # Userspace drivers
key = "pcie"
uri = "0000:01:00.0"
nsid = 1
labels = ["dev", "pcie", "nvm"]
driver_attachment = "userspace"

[[duts]]
pcie = "0000:01:00.0"
os = "0n1"
sn = "XXXXXXXXXXXXXXXX"
label = "SAMSUNG990PRO2TB"

[hugetlbfs]
mount_point = "/mnt/huge"
nr_hugepages = "128"
