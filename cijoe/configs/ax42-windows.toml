# The SSH options are passed verbatim to paramiko; see
# https://www.paramiko.org/ This is common CIJOE infrastructure
#
# Used by: cijoe.run() / cijoe.get() / cijoe.put()
[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[os]
name = "windows"
version = "11"
prettyname = "Windows"

[cijoe.run]
shell = "bash"

[build.compiler]
bin = "gcc"

[cijoe.workflow]
fail_fast=true

# Used by: the qemu.*.py scripts
[qemu]
img_bin = "qemu-img"
default_guest = "generic-bios-kvm-x86_64"
default_systemimage = "windows-11"

# Used by: qemu.build.py
[qemu.build]
prefix = "{{ local.env.HOME }}/opt/qemu"

[qemu.systems.x86_64]
bin = "qemu-system-x86_64"

# Used by: qemu.guest_initialize.py, qemu.guest_start.py, and qemu.guest_kill.py
[qemu.guests.generic-bios-kvm-x86_64]
path = "{{ local.env.HOME }}/guests/generic-bios-kvm-x86_64"

# Label of the qemu-system emulerator to use; see "qemu.systems"
system_label = "x86_64"

# Keyword arguments: joined onto the form: "-cpu host -smp 4 -m 4" etc.
system_args.kwa = {cpu = "host", smp = 6, m = "32G", accel = "kvm"}

# Raw arguments: passed without modification to qemu-system-{arch}
system_args.raw = """\
-drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.ms.fd \
-drive if=pflash,format=raw,file={{ local.env.HOME }}/system_imaging/fd/win11_VARS.fd \
-blockdev driver=qcow2,node-name=boot,file.driver=file,file.filename={{ local.env.HOME }}/guests/generic-bios-kvm-x86_64/boot2.img \
-device ide-hd,drive=boot \
-drive file={{ local.env.HOME }}/system_imaging/iso/virtio-win.iso,media=cdrom \
-M q35,kernel_irqchip=split \
-chardev socket,id=chrtpm,path={{ local.env.HOME }}/guests/generic-bios-kvm-x86_64/swtpm.sock \
-tpmdev emulator,id=tpm0,chardev=chrtpm \
-device tpm-tis,tpmdev=tpm0 \
-device pcie-root-port,id=rp_nvme,chassis=2,slot=2 \
-device vfio-pci,host=0000:02:00.0,bus=rp_nvme
"""

# Managed arguments: expands into longer incantations
system_args.tcp_forward = {host = 4200, guest = 22}

[[devices]]
key = "bdev"
uri = "\\\\.\\PhysicalDrive1" # backslashes need to be escaped
nsid = 1
labels = [ "dev", "bdev", "nvm" ]
driver_attachment = "kernel"

[[duts]]
pcie = "0000:01:00.0"
os = "0n1"
sn = "XXXXXXXXXXXXXXXX"
label = "SAMSUNG990PRO2TB"

[xnvme.repository]
remote = "https://github.com/xnvme/xnvme.git"
path = "C:/Users/odus/git/xnvme"
branch = "main"

[xnvme.repository.sync]
branch = "wip"
remote_alias = "guest"
remote_path = "C:/Users/odus/tmp/xnvme"

[xnvme.build]
type = "debug"

[fio]
bin = "C:/Users/odus/git/fio/fio.exe"

[fio.repository]
remote = "https://github.com/axboe/fio.git"
path = "C:/Users/odus/git/fio"
tag = "fio-3.41"

[fio.engines]
null = {type = "builtin", group = "null", device = "bdev"}
windowsaio = {type = "builtin", group = "windowsaio", device = "bdev"}

xnvme_null = {type = "builtin", group = "null", be = "windows", async = "nil", device = "bdev"}
xnvme_ioring = {type = "builtin", group = "windowsaio", be = "windows", async = "io_ring", device = "bdev"}
xnvme_iocp = {type = "builtin", group = "windowsaio", be = "windows", async = "iocp", device = "bdev"}
xnvme_iocpth = {type = "builtin", group = "windowsaio", be = "windows", async = "iocp_th", device = "bdev"}
