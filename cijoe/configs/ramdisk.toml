[xnvme.repository]
remote = "https://github.com/xnvme/xnvme.git"
path = "{{ local.env.HOME }}/git/xnvme"

[xnvme.repository.sync]
branch = "wip"
remote = "guest"
remote_path = "/root/git/xnvme"

[build.compiler]
bin = "gcc"

[[devices]]
uri = "2GB"
nsid = 1
labels = [ "dev", "bdev", "nvm", "ramdisk", "scc", "log_health_ns", "idfy_cs" ]
driver_attachment = "kernel"
