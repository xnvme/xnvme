# Fabrics devices (NVM on nvme3, 0000:04:00.0)
[[devices]]
uri = "127.0.0.1:4420"
pcie_id = "0000:04:00.0"
subnqn = "nqn.2019-08.org.qemu:beef0003"
nsid = 1
labels = [ "dev", "fabrics", "nvm", "write_zeroes", "log_health_ns", "idfy_cs" ]
driver_attachment = "userspace"

[[devices]]
uri = "/tmp/xnvme-testfile.bin"
