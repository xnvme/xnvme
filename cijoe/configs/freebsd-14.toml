# The SSH options are passed verbatim to paramiko; see https://www.paramiko.org/
[cijoe.transport.root]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

# Operator account on nosi images; used by root_unlock. Inert when root SSH
# already works (fork-based guest, or pre-unlocked images).
[cijoe.transport.odus]
username = "odus"
password = "odus.321"
hostname = "localhost"
port = 4200

[os]
name = "freebsd"
version = "14"

[cijoe.run]
shell = "csh"

[build.compiler]
bin = "clang"

# Used by: qemu.build.py
[qemu.repository]
remote = "https://github.com/qemu/qemu.git"
path = "{{ local.env.HOME }}/git/qemu"
tag = "v8.0.0"

# Used by: qemu.build.py
[qemu.build]
prefix = "{{ local.env.HOME }}/opt/qemu"

[qemu]
img_bin = "qemu-img"
default_guest = "freebsd_14"
default_systemimage = "freebsd-14-x86_64"

[guest_image]
url = "https://ghcr.io/v2/safl/nosi/freebsd-14-headless/blobs/sha256:3a834389b4f1d4dddf4cddc2adb3e7a5ad71994d9851bd0c281f185031ed6878"

[qemu.systems.x86_64]
bin = "qemu-system-x86_64"

# Used by: qemu.guest_start.py and qemu.guest_kill.py
[qemu.guests.freebsd_14]
path = "{{ local.env.HOME }}/guests/freebsd-14-amd64"
system_label = "x86_64"

# Keyword arguments: joined onto the form: "-cpu host -smp 4 -m 4" etc.
system_args.kwa = {cpu = "host", smp = 4, m = "16G", accel = "kvm"}

# Raw arguments: passed without modification to qemu-system-{arch}
system_args.raw = """\
-M "type=q35,kernel_irqchip=split" \
-device "intel-iommu,pt=on,intremap=on,caching-mode=on" \
"""

# Managed arguments: expands into longer incantations
system_args.tcp_forward = {host = 4200, guest = 22}
#system_args.host_share = "{{ local.env.HOME }}/git"

[kvssd]
binary = "{{ local.env.HOME }}/guests/vfu_kvssd"
url = "https://github.com/safl/vfio-user-kvssd/releases/download/v0.1.11/vfu_kvssd-0.1.11-x86_64-linux"
socket = "/tmp/vfu_kvssd.sock"

# =============================================================================
# Devices - One namespace per controller to match flattened QEMU layout
# =============================================================================

# nvme0: NVM (controller at 0000:01:00.0)
[[devices]]
uri = "/dev/nvme0ns1"
nsid = 1
labels = [ "dev", "bdev", "nvm", "scc", "write_zeroes", "log_health_ns", "idfy_cs" ]
driver_attachment = "kernel"

[[devices]]
uri = "0000:01:00.0"
nsid = 1
labels = [ "dev", "pcie", "nvm", "scc", "write_zeroes", "ctrlr", "log_health_ns", "idfy_cs" ]
driver_attachment = "userspace"

# nvme1: ZNS (controller at 0000:02:00.0). Kernel cdev intentionally omitted;
# FreeBSD's nvme(4) doesn't expose ZNS NS as cdev under upstream QEMU. PCIe BDF
# kept for test_scan parity.
# TODO: re-add the kernel cdev once FreeBSD's nvme driver creates the
# namespace cdev for upstream QEMU's ZNS NS.
[[devices]]
uri = "0000:02:00.0"
nsid = 1
labels = [ "dev", "pcie", "zns", "zrwa", "log_health_ns", "idfy_cs" ]
driver_attachment = "userspace"

# nvme2: KV (controller at 0000:03:00.0)
[[devices]]
uri = "/dev/nvme2ns1"
nsid = 1
labels = [ "dev", "cdev", "kvs", "log_health_ns", "idfy_cs" ]
driver_attachment = "kernel"

[[devices]]
uri = "0000:03:00.0"
nsid = 1
labels = [ "dev", "pcie", "kvs", "log_health_ns", "idfy_cs" ]
driver_attachment = "userspace"

