---
doc: |
  Provision a qemu guest with vfio-pci passthru

  The operating system is defined by the bootable system-image in the cijoe
  config-section qemu.guests.GUEST_NAME, specifically 
  init_using_bootimage.url
  init_using_bootimage.img

  On "local" the folder "/tmp/artifacts", must contain

  * xnvme-src.tar.gz
  * xnvme-py-sdist.tar.gz

  These will be transferred to the guest, and unpacked in "/tmp/xnvme_source",
  then built and installed.

steps:
- name: guest_kill
  uses: qemu.guest_kill
  with:
    guest_name: "{{ config.qemu.default_guest }}"

- name: stage_nosi_guest
  uses: stage_nosi_guest

- name: guest_initialize
  uses: qemu.guest_initialize
  with:
    guest_name: "{{ config.qemu.default_guest }}"
    system_image_name: "{{ config.qemu.default_systemimage }}"

- name: windows_qemu_prep
  uses: windows_qemu_prep
  with:
    guest_name: "{{ config.qemu.default_guest }}"

- name: windows_guest_start
  uses: windows_qemu_guest_start
  with:
    guest_name: "{{ config.qemu.default_guest }}"

- name: guest_start
  uses: qemu.guest_start
  with:
    guest_name: "{{ config.qemu.default_guest }}"

- name: root_unlock
  uses: root_unlock

- name: guest_check
  run: |
    hostname

- name: packages_extra
  run: |
    apt-get install -qy dmidecode patchelf || true
    pkg install -y dmidecode patchelf || true

- name: xnvme_source_sync
  uses: xnvme_source_from_tgz
  with:
    artifacts: '/tmp/artifacts'
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: xnvme_build_prep
  uses: xnvme_build_prep
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: xnvme_build
  uses: xnvme_build
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: xnvme_install
  uses: xnvme_install
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: ldconfig
  run: |
    ldconfig /usr/local/lib/ || true

# remove native pytest before installing cijoe
- name: remove_pytest
  run: |
    apt-get remove -qy python3-pytest || true

- name: xnvme_bindings_py_install_tgz
  uses: xnvme_bindings_py_install_tgz
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: fio_prep
  uses: fio_prep

- name: spdk_source
  run: |
    cp -r {{ config.xnvme.repository.sync.remote_path }}/subprojects/spdk /tmp/spdk

- name: spdk_fio_plugin
  uses: spdk_fio_plugin
  with:
    spdk_source: /tmp/spdk

- name: spdk_kmod_freebsd
  run: |
    kldconfig -i -m -vv /tmp/spdk/dpdk/build/kmod || true

- name: bdev_confs
  uses: spdk_bdev_confs_generator
  with:
    bdev_confs: /opt/bdev_confs

- name: prep_driver
  run: |
    xnvme-driver || true
    xnvme-driver reset || true

# The maas guest passes a real NVMe through with vfio-pci. The nested
# DMA mask doesn't reach SPDK's default IOVA-VA allocations, so DPDK
# fails with "IOVA exceeding limits of current DMA mask". Force PA on
# this guest; xnvme picks the value up via XNVME_SPDK_IOVA_MODE in
# lib/xnvme_be_spdk_dev.c as a fallback when opts.iova_mode is unset.
- name: set_iova_mode_pa
  run: |
    echo "XNVME_SPDK_IOVA_MODE=pa" >> /etc/environment
