---
doc: |
  Test xNVMe on Linux

steps:
- name: sysinfo
  uses: linux.sysinfo

- name: enumerate
  run: |
    which xnvme && xnvme enum || true
    for d in /sys/class/nvme/nvme*; do echo "$(basename $d): $(cat $d/address) $(cat $d/serial)"; done

- name: hugepages
  uses: linux_setup_hugepages

# Diagnostic: enumerate pcie nvme controllers and probe each via SPDK.
# Output is captured per-cmd. With a release build SPDK chatter is
# routed to /dev/null by the choker; for verbose probe output, build
# xnvme with -Dbuildtype=debug.
- name: spdk_probe_diag
  run: |
    for d in $(lspci -nn -d ::0108 | awk '{print "0000:"$1}'); do echo "--- spdk-probe on $d ---"; xnvme info "$d" --be spdk 2>&1 || true; done || true

- name: test_python
  uses: core.testrunner
  with:
    args: '{{ config.xnvme.repository.sync.remote_path }}/python/tests --timeout=60 --timeout-method=thread -k "not fabrics
      and not libvfn and not test_list"'
    run_local: false
    random_order: false

- name: test_ramdisk
  uses: core.testrunner
  with:
    args: '-k "ramdisk" tests'
    random_order: false

- name: test_os
  uses: core.testrunner
  with:
    args: '-k "(not ramdisk) and (not pcie) and (not upcie) and (not fabrics)" tests'
    random_order: false

- name: test_pcie
  uses: core.testrunner
  with:
    args: '-k "pcie and not upcie" tests'
    random_order: false
