---
doc: |
  Test xNVMe over the NVMe TCP transport on Linux (kernel nvmet target)

steps:
- name: sysinfo
  uses: linux.sysinfo

- name: hugepages
  uses: linux_setup_hugepages

- name: nvme_target_start
  uses: nvme_target_start
  with:
    provider: linux

- name: test_transport_tcp
  uses: core.testrunner
  with:
    args: '-k "fabrics" tests'
    random_order: false

- name: nvme_target_stop
  uses: nvme_target_stop
  with:
    provider: linux
