---
doc: |
  Test xNVMe on Linux

steps:
- name: sysinfo
  uses: linux.sysinfo

- name: enumerate
  run: |
    which xnvme && xnvme enum || true
    for d in /sys/class/nvme/nvme*; do echo "$(basename $d): $(cat $d/address) $(cat $d/serial)"; done

- name: hugepages
  uses: linux_setup_hugepages

- name: test_python
  uses: core.testrunner
  with:
    args: '{{ config.xnvme.repository.sync.remote_path }}/python/tests --timeout=60 --timeout-method=thread -k "not fabrics
      and not libvfn and not test_list"'
    run_local: false
    random_order: false

- name: test_ramdisk
  uses: core.testrunner
  with:
    args: '-k "ramdisk" tests'
    random_order: false

- name: test_os
  uses: core.testrunner
  with:
    args: '-k "(not ramdisk) and (not pcie) and (not upcie) and (not fabrics)" tests'
    random_order: false

- name: test_pcie
  uses: core.testrunner
  with:
    args: '-k "pcie and not upcie and not test_mem_map_unmap" tests'
    random_order: false

- name: test_fabrics
  uses: core.testrunner
  with:
    args: '-k "fabrics" tests'
    random_order: false
