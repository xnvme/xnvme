---
doc: |
  Create a Debian Trixie boot.img using a cloud-init image and Linux kernel .deb packages

  After creating, then
  * Shut down the guest
  * Convert the image (with compression)
    - qemu-img convert boot.img /tmp/debian-trixie-amd64.qcow2 -O qcow2 -c
  * Upload it to DigitalOcean

steps:
- name: guest_kill
  uses: qemu.guest_kill
  with:
    guest_name: trixie_amd64

- name: guest_initialize
  uses: system_imaging.diskimage_from_cloudimage
  with:
    pattern: "debian-13-x86_64"

- name: guest_start
  uses: xnvme_guest_start_nvme
  with:
    guest_name: trixie_amd64

- name: guest_check
  run: |
    hostname
    uname -a

- name: guest_update
  run: |
    apt-get -qy -o "DPkg::Lock::Timeout=180" -o "Dpkg::Options::=--force-confdef" -o "Dpkg::Options::=--force-confold" upgrade
    apt-get -qy autoclean
    apt-get -qy install aptitude
    aptitude -q -y -f install git

- name: xnvme_source_sync
  uses: xnvme_source_from_tgz
  with:
    artifacts: '/tmp/artifacts'
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: xnvme_build_prep
  uses: xnvme_build_prep
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: remove_source
  run: |
    rm -rf {{ config.xnvme.repository.sync.remote_path }}

- name: guest_grub_default
  run: |
    update-grub
    grub-set-default 1
    update-grub
    sync

- name: guest_info
  uses: linux.sysinfo

- name: guest_shutdown
  run: |
    sync
    systemctl poweroff
