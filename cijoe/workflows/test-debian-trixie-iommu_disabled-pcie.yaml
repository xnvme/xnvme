---
doc: |
  Test xNVMe uPCIe backend on Linux without IOMMU

steps:
- name: sysinfo
  uses: linux.sysinfo

- name: enumerate
  run: |
    which xnvme && xnvme enum || true
    for d in /sys/class/nvme/nvme*; do echo "$(basename $d): $(cat $d/address) $(cat $d/serial)"; done

- name: hugepages
  uses: linux_setup_hugepages

- name: test_python
  uses: core.testrunner
  with:
    # Mirror trixie's python tests minus libvfn (needs vfio-pci).
    args: '{{ config.xnvme.repository.sync.remote_path }}/python/tests --timeout=60 --timeout-method=thread -k "not fabrics
      and not libvfn"'
    run_local: false
    random_order: false

- name: test_upcie
  uses: core.testrunner
  with:
    args: '-k "(upcie or spdk) and not fabrics" tests'
    random_order: false
