---
doc: |
  Test xNVMe on FreeBSD

steps:
- name: sysinfo
  uses: freebsd_sysinfo

- name: enumerate
  run: |
    which xnvme && xnvme enum || true
    pciconf -l | grep nvme

- name: kldconfig
  uses: xnvme_kldconfig
  with:
    xnvme_source: '{{ config.xnvme.repository.sync.remote_path }}'

- name: test_ramdisk
  uses: core.testrunner
  with:
    args: '-k "ramdisk" tests'
    random_order: false

- name: test_os
  uses: core.testrunner
  with:
    args: '-k "(not ramdisk) and (not pcie) and (not fabrics)" tests'
    random_order: false

- name: test_pcie
  uses: core.testrunner
  with:
    args: '-k "pcie" tests'
    random_order: false
