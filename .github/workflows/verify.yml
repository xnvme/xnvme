---
name: verify

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches: [main]
  workflow_dispatch:
    inputs:
      job:
        description: 'Job'
        required: true
        default: docgen
        type: choice
        options:
        - verify
        - bench
        - docgen

defaults:
  run:
    shell: bash

jobs:
  #
  # Produce a source-archive (with and without subprojects)
  #
  # with-subprojects
  # 
  #   To provide an artifact consisting of xNVMe and dependent projects for
  #   CI to consume as well as users in environments with no network access, a
  #   one-stop shop
  #
  # without-subprojects
  # 
  #   Primarily for system-package maintainers, for these then the dependencies
  #   are solved via the package-manager and related packages that may or
  #   may not be available, and thus, no "bundled" dependencies. Also, for
  #   minimalistic users, that does not need the external deps of e.g. SPDK
  #   and libvfn.
  #
  source-archive:
    runs-on: ubuntu-latest
    container: ghcr.io/xnvme/xnvme-deps-alpine-latest:main
    strategy:
      matrix:
        variant: [with-subprojects, without-subprojects]
    steps:
    - name: Grab source
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Add repos to git-config safe.directory
      run: |
        git config --global --add safe.directory $(pwd)

    - name: Check repository...
      run: |
        ls -lha
        git status

    - name: Generate Source Archive
      run: |
        if [ "${{ matrix.variant }}" = "with-subprojects" ]; then
          make clean gen-src-archive-with-subprojects
        else
          make clean gen-src-archive
        fi

    - name: Rename to un-versioned xnvme-src.tar.gz
      run: |
        mv builddir/meson-dist/xnvme-0.7.5.tar.gz builddir/meson-dist/xnvme-src.tar.gz
        mv builddir/meson-dist/xnvme-0.7.5.tar.gz.sha256sum builddir/meson-dist/xnvme-src.tar.gz.sha256sum

    - name: Upload source archive
      uses: actions/upload-artifact@v4.3.0
      with:
        name: xnvme-src-archive${{ matrix.variant == 'with-subprojects' && '-with-subprojects' || '' }}
        path: |
          builddir/meson-dist/xnvme-src.tar.gz.sha256sum
          builddir/meson-dist/xnvme-src.tar.gz
        if-no-files-found: error

  #
  # Check source-format using pre-commit
  #
  source-format-check:
    runs-on: ubuntu-latest
    container: ghcr.io/xnvme/xnvme-deps-fedora-citools:main

    steps:
    - name: Grab source
      uses: actions/checkout@v6

    - name: Add repos to git-config safe.directory
      run: |
        git config --global --add safe.directory $(pwd)

    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Run pre-commit
      run: pre-commit run --all-files

  #
  # Ensure that bash completions and man pages can be generated without error
  #
  test-gen-targets:
    needs: source-archive
    runs-on: ubuntu-latest
    container: ghcr.io/xnvme/xnvme-deps-citools-latest:main

    steps:
    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Build xNVMe
      run: make common

    - name: Install xNVMe
      run: make install

    - name: ldconfig
      run: ldconfig

    - name: Execute 'xnvme library-info'
      run: xnvme library-info

    - name: Run make gen-bash-completions
      run: make gen-bash-completions

    - name: Run make gen-man-pages
      run: make gen-man-pages

  build-rust:
    needs: source-archive
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xnvme/xnvme-deps-debian-trixie:main

    steps:
    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Install dependencies
      run: |
        apt-get update -qy
        apt-get install -qy curl libclang-17-dev

    - name: Build xNVMe
      run: make common

    - name: Install xNVMe
      run: make install

    - name: ldconfig
      run: ldconfig

    - name: Execute 'xnvme library-info'
      run: xnvme library-info

    - uses: dtolnay/rust-toolchain@stable

    - name: Rust, generate and build bindings
      run: cargo build --release --manifest-path rust/Cargo.toml

    - name: Rust, run example
      run: cargo run --manifest-path rust/Cargo.toml

  #
  # Build xNVMe Python packages
  #
  build-python:
    needs: source-archive
    runs-on: ubuntu-latest
    container: ghcr.io/xnvme/xnvme-deps-debian-trixie:main
    strategy:
      fail-fast: false

    steps:
    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Python sdist-packages, system-package deps.
      run: |
        apt-get install -qy libclang-17-dev

    - name: Python sdist-packages, build bindings
      run: |
        pushd python/bindings
        make clean build
        popd

    - name: Python sdist-packages, find(...)
      run: |
        find python/ -name *tar.gz

    - name: Rename
      run: |
        mv python/bindings/dist/xnvme-*.*.*.tar.gz python/bindings/dist/xnvme-py-sdist.tar.gz

    - name: Python sdist-packages, upload bindings
      uses: actions/upload-artifact@v4.3.0
      with:
        name: xnvme-py-sdist
        path: |
          python/bindings/dist/xnvme-py-sdist.tar.gz
        if-no-files-found: error

  #
  # Build on Linux using different Linux distributions
  #
  build-linux:
    needs: [source-archive, source-format-check, build-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        container:
        # Using an alpine container which is the same as upstream but with bash
        # alpine: SPDK not supported, --with-spdk=disabled
        - {os: 'alpine', dh: 'refenv/alpine-bash', ver: 'latest'}
        - {os: 'archlinux', dh: 'archlinux', ver: 'latest'}
        - {os: 'centos', dh: 'quay.io/centos/centos', ver: 'stream9'}
        - {os: 'centos', dh: 'quay.io/centos/centos', ver: 'stream10'}
        - {os: 'debian', dh: 'debian', ver: 'bookworm'}
        - {os: 'debian', dh: 'debian', ver: 'forky'}
        - {os: 'debian', dh: 'debian', ver: 'trixie'}
        - {os: 'fedora', dh: 'fedora', ver: '42'}
        - {os: 'fedora', dh: 'fedora', ver: '43'}
        - {os: 'gentoo', dh: 'gentoo/stage3', ver: 'latest'}
        - {os: 'opensuse-tumbleweed', dh: 'opensuse/tumbleweed', ver: 'latest'}
        - {os: 'oraclelinux', dh: 'oraclelinux', ver: '9'}
        - {os: 'oraclelinux', dh: 'oraclelinux', ver: '10'}
        - {os: 'rockylinux', dh: 'rockylinux/rockylinux', ver: '9.7'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'jammy'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'noble'}
        - {os: 'ubuntu', dh: 'ubuntu', ver: 'questing'}

    container:
      image: ghcr.io/xnvme/xnvme-deps-${{ matrix.container.os }}-${{ matrix.container.ver }}:main

    steps:
    - name: Container-preparation, openSUSE does not have tar and gzip...
      if: contains(matrix.container.os, 'opensuse')
      run: zypper --non-interactive --no-refresh install -y tar gzip

    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Configure with and build with debug enabled (without spdk)
      if: ${{ contains(matrix.container.os, 'alpine') }}
      run: |
        meson setup builddir --buildtype=debug -Dwith-spdk=disabled
        meson compile -C builddir
        make clean # prepare for building without debug

    - name: Configure with debug enabled
      if: ${{ ! contains(matrix.container.os, 'alpine') }}
      run: |
        meson setup builddir --buildtype=debug
        meson compile -C builddir
        make clean # prepare for building without debug

    - name: Configure, Build, and Install
      env:
        BSCRIPT_DEF: toolbox/pkgs/default-build.sh
        BSCRIPT: toolbox/pkgs/${{ matrix.container.os }}-${{ matrix.container.ver }}-build.sh
      run: |
        if [[ -f "${BSCRIPT}" ]]; then source ${BSCRIPT}; else source ${BSCRIPT_DEF}; fi

    - name: Execute 'ldconfig'
      # ldconfig doesn't work on alpine
      # centos7 needs "ldconfig /usr/lib/local" for python3 to work
      if: ${{!contains(matrix.container.os, 'alpine') && !contains(matrix.container.ver, 'centos7') && !contains(matrix.container.ver,
        'stream8')}}
      run: ldconfig

    - name: meson-log-dump
      if: always()
      run: |
        cat builddir/meson-logs/meson-log.txt || true

    - name: isal-log-dump
      if: always()
      run: |
        cat subprojects/spdk/isa-l/spdk-isal.log || true

    - name: Execute 'xnvme enum'
      run: xnvme enum

    - name: Execute 'xnvme library-info'
      run: xnvme library-info

    - name: Check pkg-config
      run: |
        pkg-config xnvme --libs
        pkg-config xnvme --variable=datadir
        pkg-config xnvme --variable=includedir
        pkg-config xnvme --variable=libdir
        pkg-config xnvme --variable=pcfiledir
        pkg-config xnvme --variable=prefix
        ls -lh $(pkg-config xnvme --variable=libdir) | grep xnvme

    - name: Check Python, pip, pipx, platform, sysconfig and setup PATH for pipx
      run: |
        python3 --version
        python3 -m pip --version
        python3 -c 'import setuptools; print("setuptools version:", setuptools.__version__)'
        python3 -c "import platform; print(platform.system()); print(platform.uname())"
        python3 -c 'import sysconfig; print(sysconfig.get_config_var("SHLIB_SUFFIX"))'
        python3 -m pipx --version
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Retrieve the xNVMe Python sdist package
      uses: actions/download-artifact@v4.1.7
      with:
        name: xnvme-py-sdist
        path: ${{ steps.source.outputs.directory }}

    # Setup Python virtual-environment for cijoe and Python xNVMe bindings to run ramdisk testing
    - name: CIJOE, setup pipx environment
      if: (!contains('focal', matrix.container.ver))
      run: |
        make cijoe-install

    - name: CIJOE, check that it is available
      if: (!contains('focal', matrix.container.ver))
      run: |
        cijoe -r

    - name: Python-bindings (ctypes), install and test
      if: (!contains('focal', matrix.container.ver))
      run: |
        python3 -m pipx inject xnvme-cijoe "${{ steps.source.outputs.directory }}/xnvme-py-sdist.tar.gz" --force
        pytest --pyargs xnvme.ctypes_bindings

    #
    # Ramdisk testing
    #
    # Skipping on distros with too old gcc/clang to build fio, and too old a Python to run cijoe (requires 3.9)
    #
    - name: CIJOE, run ramdisk verification
      if: (!contains('focal', matrix.container.ver))
      run: make verify-ramdisk CIJOE_OUTPUT="${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}"

    - name: CIJOE, upload report.html
      if: always() && (!contains('focal', matrix.container.ver))
      uses: actions/upload-artifact@v4.3.0
      with:
        name: ${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-report-html
        path: cijoe/${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-*/report.html
        if-no-files-found: warn

    - name: CIJOE, archive build-${{ matrix.container.os }}-${{ matrix.container.ver }}-reports
      if: always() && (!contains('focal', matrix.container.ver))
      run: |
        tar czf ${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-reports.tar.gz \
          cijoe/${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-*

    - name: CIJOE, upload build-${{ matrix.container.os }}-${{ matrix.container.ver }}-reports
      if: always() && (!contains('focal', matrix.container.ver))
      uses: actions/upload-artifact@v4.3.0
      with:
        name: ${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-reports
        path: ${{ github.job }}-${{ matrix.container.os }}-${{ matrix.container.ver }}-reports.tar.gz
        if-no-files-found: error

  #
  # Build on macOS
  #
  build-macos:
    needs: [source-archive, source-format-check, build-python]
    runs-on: ${{ matrix.runner.os }}-${{ matrix.runner.ver }}
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        runner:
        - {os: 'macos', ver: '14'}
        - {os: 'macos', ver: '15'}

    steps:
    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Install build-requirements
      run: |
        source toolbox/pkgs/${{ matrix.runner.os }}-${{ matrix.runner.ver }}.sh || true

    - name: Prep, environment GITHUB_PATH
      run: |
        echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

    - name: Configure and build with debug enabled
      run: |
        meson setup builddir --buildtype=debug
        meson compile -C builddir
        make clean # prepare for building without debug

    - name: Configure, Build, and Install
      env:
        BSCRIPT_DEF: toolbox/pkgs/default-build.sh
        BSCRIPT: toolbox/pkgs/${{ matrix.runner.os }}-${{ matrix.runner.ver }}-build.sh
      run: |
        if [[ -f "${BSCRIPT}" ]]; then source ${BSCRIPT}; else source ${BSCRIPT_DEF}; fi

    - name: meson-log-dump
      if: always()
      run: |
        cat builddir/meson-logs/meson-log.txt || true

    - name: Execute 'xnvme enum'
      run: xnvme enum

    - name: Execute 'xnvme library-info'
      run: xnvme library-info

    - name: Check pkg-config
      run: |
        pkg-config xnvme --libs
        pkg-config xnvme --variable=datadir
        pkg-config xnvme --variable=includedir
        pkg-config xnvme --variable=libdir
        pkg-config xnvme --variable=pcfiledir
        pkg-config xnvme --variable=prefix
        ls -lh $(pkg-config xnvme --variable=libdir) | grep xnvme

    - name: Check Python, pip, platform, and sysconfig
      run: |
        python3 --version
        python3 -m pip --version
        python3 -c "import platform; print(platform.system()); print(platform.uname())"
        python3 -c 'import sysconfig; print(sysconfig.get_config_var("SHLIB_SUFFIX"))'

    - name: Retrieve the xNVMe Python sdist package
      uses: actions/download-artifact@v4.1.7
      with:
        name: xnvme-py-sdist
        path: ${{ steps.source.outputs.directory }}

    # Setup Python virtual-environment for cijoe and Python xNVMe bindings to run ramdisk testing
    - name: CIJOE, setup pipx environment
      run: |
        make cijoe-install

    - name: CIJOE, check that it is available
      run: |
        cijoe -r

    - name: Python-bindings (ctypes), install and test
      run: |
        pipx inject xnvme-cijoe "${{ steps.source.outputs.directory }}/xnvme-py-sdist.tar.gz" --force
        pytest --pyargs xnvme.ctypes_bindings

    #
    # Ramdisk testing
    #
    - name: Install fio
      run: |
        git clone https://github.com/axboe/fio.git /tmp/fio
        cd /tmp/fio
        git checkout fio-3.38
        git rev-parse --short HEAD
        gmake

    - name: CIJOE, run test-ramdisk.yaml
      run: |
        cd cijoe && cijoe "workflows/test-ramdisk-macos.yaml" \
        --monitor \
        --config "configs/ramdisk-macos.toml" \
        --config "configs/xnvme.toml" \
        --output "${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-test-ramdisk"

    - name: CIJOE, upload report.html
      if: always()
      uses: actions/upload-artifact@v4.3.0
      with:
        name: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-report-html
        path: cijoe/${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-*/report.html
        if-no-files-found: warn

    - name: CIJOE, archive build-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
      if: always()
      run: |
        tar czf ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports.tar.gz \
          cijoe/${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-*

    - name: CIJOE, upload build-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
      uses: actions/upload-artifact@v4.3.0
      if: always()
      with:
        name: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
        path: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports.tar.gz
        if-no-files-found: error

  #
  # Build on Windows
  #
  build-windows:
    needs: [source-archive, source-format-check, build-python]
    runs-on: ${{ matrix.runner.os }}-${{ matrix.runner.ver }}
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        runner:
        - {os: 'windows', ver: '2025'}

    steps:
    - name: Setup paths
      shell: cmd
      run: |
        echo %ALLUSERSPROFILE%\chocolatey\bin>> %GITHUB_PATH%
        echo %SystemDrive%\tools\msys64\mingw64\bin>> %GITHUB_PATH%
        echo %SystemDrive%\tools\msys64>> %GITHUB_PATH%
        echo %SystemDrive%\tools\msys64\usr\lib>> %GITHUB_PATH%
        echo %SystemDrive%\tools\msys64\usr\bin>> %GITHUB_PATH%
        echo PKG_CONFIG_PATH=%SystemDrive%/tools/msys64/usr/lib/pkgconfig;%SystemDrive%\tools\msys64\usr\lib\pkgconfig >> %GITHUB_ENV%

    - name: Show paths
      shell: powershell
      run: |
        echo $env:Path

    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Install build-requirements
      shell: powershell
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        .\toolbox\pkgs\windows-2022.ps1

    - name: Configure and build with debug enabled
      shell: bash
      run: |
        meson setup builddir --buildtype=debug
        meson compile -C builddir
        make clean # prepare for building without debug

    - name: Build!
      shell: powershell
      run: |
        meson setup builddir --prefix "$env:SystemDrive\tools\msys64\usr" --default-library=static
        meson compile -C builddir

    - name: meson-log-dump
      shell: bash
      if: always()
      run: |
        cat builddir/meson-logs/meson-log.txt || true

    - name: Dump the compile-commands and machine
      shell: bash
      run: |
        cat /proc/cpuinfo || true
        cat builddir/compile_commands.json || true

    - name: Install
      run: |
        meson install -C builddir

    - name: Execute xnvme commands
      shell: powershell
      run: |
        xnvme.exe library-info
        xnvme.exe enum

    - name: Check pkg-config
      shell: bash
      run: |
        pkg-config xnvme --libs
        pkg-config xnvme --variable=datadir
        pkg-config xnvme --variable=includedir
        pkg-config xnvme --variable=libdir
        pkg-config xnvme --variable=pcfiledir
        pkg-config xnvme --variable=prefix
        ls -lh $(pkg-config xnvme --variable=libdir) | grep xnvme

    - name: Check Python, pip, platform, and sysconfig
      shell: bash
      run: |
        python3 --version
        python3 -m pip --version
        python3 -c "import platform; print(platform.system()); print(platform.uname())"
        python3 -c 'import sysconfig; print(sysconfig.get_config_var("SHLIB_SUFFIX"))'

    - name: Retrieve the xNVMe Python sdist package
      uses: actions/download-artifact@v4.1.7
      with:
        name: xnvme-py-sdist
        path: ${{ steps.source.outputs.directory }}

    # Setup Python virtual-environment for cijoe and Python xNVMe bindings to run ramdisk testing
    - name: CIJOE, setup pipx environment
      run: |
        make cijoe-install

    - name: CIJOE, check that it is available
      run: |
        cijoe -r

    #
    # Ramdisk testing
    #
    - name: Install fio
      shell: bash
      run: |
        rm -rf C:/tmp/fio
        git clone https://github.com/axboe/fio.git C:/tmp/fio
        cd C:/tmp/fio
        git checkout fio-3.41
        git rev-parse --short HEAD
        make clean
        make CFLAGS="-O0"

    - name: CIJOE, run test-ramdisk-windows.yaml
      shell: bash
      run: |
        cd cijoe; cijoe "workflows/test-ramdisk-windows.yaml" \
        --monitor \
        --config "configs/ramdisk-windows.toml" \
        --output "${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-test-ramdisk"

    - name: CIJOE, upload report.html
      if: always()
      uses: actions/upload-artifact@v4.3.0
      with:
        name: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-report-html
        path: cijoe/${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-*/report.html
        if-no-files-found: warn

    - name: CIJOE, archive build-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
      if: always()
      run: |
        tar czf ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports.tar.gz \
          cijoe/${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-*

    - name: CIJOE, upload build-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
      uses: actions/upload-artifact@v4.3.0
      if: always()
      with:
        name: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports
        path: ${{ github.job }}-${{ matrix.runner.os }}-${{ matrix.runner.ver }}-reports.tar.gz
        if-no-files-found: error

  #
  # Build and test xNVMe
  #
  verify:
    needs: [source-archive, source-format-check, build-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.job == 'verify')

    strategy:
      fail-fast: false
      matrix:
        guest:
        - {os: 'freebsd', ver: '14'}
        #- {os: 'freebsd', ver: '15'}
        - {os: 'debian', ver: 'trixie'}
        - {os: 'debian', ver: 'trixie-noiommu'}

    container:
      image: ghcr.io/safl/nosi/ubuntu-2604-docker:latest
      # /mnt is the runner's ~70 GiB ephemeral disk; the nosi qcow2 + raw
      # decompression overflow the container's small overlay otherwise.
      options: --privileged -v /mnt:/mnt

    steps:
    - uses: xnvme/actions/.github/actions/cleanup@main

    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Retrieve the xNVMe Python sdist package
      uses: actions/download-artifact@v4.1.7
      with:
        name: xnvme-py-sdist
        path: ${{ steps.source.outputs.directory }}

    - name: Prep, environment GITHUB_PATH
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        cp -r ${{ steps.source.outputs.directory }} /tmp/artifacts
        find /tmp/artifacts

    - name: CIJOE, setup pipx environment
      run: |
        make guest-env <<< "${{ matrix.guest.os }}-${{ matrix.guest.ver }}"

    - name: CIJOE, check that it is available
      run: |
        cijoe -r

    # Land the nosi qcow2 + raw on /mnt instead of / (which is cramped).
    - name: Stage artifacts on /mnt
      if: matrix.guest.os == 'debian' || matrix.guest.os == 'freebsd'
      run: |
        mkdir -p /mnt/system_imaging
        ln -s /mnt/system_imaging "$HOME/system_imaging"

    - name: CIJOE, provision and test guest
      run: |
        make verify-guest \
          CIJOE_OUTPUT="${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}"

    - name: Collect guest serial console
      if: always() && matrix.guest.os == 'debian'
      run: |
        dst="cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}"
        echo "::group::guest serial console (tail)"
        tail -c 20000 "$HOME/guests/debian-trixie-amd64/serial.output" 2>/dev/null || echo "no guest serial output"
        echo "::endgroup::"
        cp "$HOME/guests/debian-trixie-amd64/serial.output" "${dst}-serial.output" 2>/dev/null || true

    - name: Collect vfu_kvssd device log
      if: always()
      run: |
        dst="cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}"
        echo "::group::vfu_kvssd device log"
        cat /tmp/vfu_kvssd.log 2>/dev/null || echo "no vfu_kvssd device log"
        echo "::endgroup::"
        cp /tmp/vfu_kvssd.log "${dst}-vfu_kvssd.log" 2>/dev/null || true

    - name: CIJOE, result-log-dump on error
      if: failure()
      run: find cijoe -name "*.output" | xargs cat

    - name: CIJOE, upload report.html
      if: always()
      uses: actions/upload-artifact@v4.3.0
      with:
        name: ${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-report-html
        path: cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-*/report.html
        if-no-files-found: warn

    - name: CIJOE, archive verify-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports
      if: always()
      run: |
        tar czf ${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports.tar.gz \
          cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-*

    - name: CIJOE, upload verify-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports
      uses: actions/upload-artifact@v4.3.0
      if: always()
      with:
        name: ${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports
        path: ${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports.tar.gz
