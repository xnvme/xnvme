  #
  # Documentation: generate documentation and deploy it to githubpages (xnvme.io)
  #
  # This is triggered upon:
  #
  # * push of branches and tags
  # * manual 'workflow_dispatch'
  # * pull-request changes, thus, we can catch whether a PR breaks documentation
  #
  # When triggered by 'push' or 'workflow_dispatch', then the documentation is
  # deployed to:
  #
  #   githubpages/en/<ref>
  #
  # A couple of examples:
  #
  # * githubpages/en/main
  # * githubpages/en/v1.2.3
  # * githubpages/en/v1.2.4
  #
  # Thus, upon push/dispatch then the archive/history is updated.
  # The root of the site is always synced with githubpages/en/main, so that
  # https://xnvme.io/ serves the latest state of xNVMe.
  #
  docgen:
    needs: [source-archive, source-format-check, build-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.job == 'docgen')

    strategy:
      fail-fast: false
      matrix:
        guest:
        - {os: 'debian', ver: 'trixie'}

    container:
      image: ghcr.io/safl/nosi/ubuntu-2604-docker:latest
      # /mnt is the runner's ~70 GiB ephemeral disk; the nosi qcow2 + raw
      # decompression overflow the container's small overlay otherwise.
      options: --privileged -v /mnt:/mnt

    steps:
    - uses: xnvme/actions/.github/actions/cleanup@main

    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive-with-subprojects

    - name: Container-prep
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Retrieve the xNVMe Python sdist package
      uses: actions/download-artifact@v4.1.7
      with:
        name: xnvme-py-sdist
        path: ${{ steps.source.outputs.directory }}

    - name: Move source-archives to /tmp/artifacts
      run: |
        ls -lh
        find . -name "*.tar.gz"
        find /tmp -name "*.tar.gz"
        rm -r /tmp/artifacts || true
        cp -r ${{ steps.source.outputs.directory }} /tmp/artifacts
        find /tmp/artifacts -name "*.tar.gz"

    - name: CIJOE, setup pipx environment
      run: |
        make guest-env <<< "${{ matrix.guest.os }}-${{ matrix.guest.ver }}"

    - name: CIJOE, check that it is available
      run: |
        cijoe -r

    # Land the nosi qcow2 + raw on /mnt instead of / (same as the verify job).
    - name: Stage artifacts on /mnt
      run: |
        mkdir -p /mnt/system_imaging
        ln -s /mnt/system_imaging "$HOME/system_imaging"

    # The nosi container ships qemu+cijoe; the doc toolchain comes from here.
    - name: Install doc toolchain
      run: |
        bash toolbox/pkgs/docgen.sh
        pipx install ./docs/tooling

    # cd'ing into 'cijoe' to auto-collect the non-packaged github-specific configs and
    # workflows.
    - name: CIJOE, provision and generate documentation
      run: |
        make docgen-guest \
          CIJOE_OUTPUT="${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}"

    - name: Collect vfu_kvssd device log + guest serial console
      if: always()
      run: |
        dst="cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}"
        echo "::group::vfu_kvssd device log"
        cat /tmp/vfu_kvssd.log 2>/dev/null || echo "no vfu_kvssd device log"
        echo "::endgroup::"
        cp /tmp/vfu_kvssd.log "${dst}-vfu_kvssd.log" 2>/dev/null || true
        echo "::group::guest serial console (tail)"
        tail -c 20000 "$HOME/guests/debian-trixie-amd64/serial.output" 2>/dev/null \
          || echo "no guest serial output"
        echo "::endgroup::"
        cp "$HOME/guests/debian-trixie-amd64/serial.output" "${dst}-serial.output" \
          2>/dev/null || true

    - name: CIJOE, upload report-docgen
      uses: actions/upload-artifact@v4.3.0
      if: always()
      with:
        name: ${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-reports
        path: cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}*
        if-no-files-found: error

    - name: Checkout site
      if: ((github.event_name == 'push') || ((github.event_name == 'workflow_dispatch') && (github.event.inputs.job == 'docgen')))
      uses: actions/checkout@v6
      with:
        repository: "xnvme/xnvme.github.io"
        token: ${{ secrets.DOCS_PAT }}
        path: site

    - name: Add repos to git-config safe.directory
      run: |
        git config --global --add safe.directory $(pwd)/site

    - name: Extract the website
      if: ((github.event_name == 'push') || ((github.event_name == 'workflow_dispatch') && (github.event.inputs.job == 'docgen')))
      run: |
        find cijoe
        cp cijoe/${{ github.job }}-${{ matrix.guest.os }}-${{ matrix.guest.ver }}-docs/artifacts/docs.tar.gz .
        tar xzf docs.tar.gz

    - name: Update site repository
      if: ((github.event_name == 'push') || ((github.event_name == 'workflow_dispatch') && (github.event.inputs.job == 'docgen')))
      run: |
        pipx install docs/tooling
        xnvme-docs-dest --docs html --site site --ref "${{ github.ref }}"

    - name: Push site-changes
      if: ((github.event_name == 'push') || ((github.event_name == 'workflow_dispatch') && (github.event.inputs.job == 'docgen')))
      run: |
        cd site
        git config --global user.name 'GitHUB Service'
        git config --global user.email 'ghs@safl.dk'
        git add .
        git commit -a -m "Auto-deployed update of 'docs/' for '${{ github.ref }}'"
        git push
  packaging-debian:
    needs: source-archive
    runs-on: ubuntu-latest
    container: ghcr.io/xnvme/xnvme-deps-debian-packaging:main
    if: github.event_name == 'pull_request'

    steps:
    - name: Info
      run: |
        echo "Current branch is ${{ github.base_ref }}"
        echo "Current tag is ${{ github.ref }}"

    - name: Retrieve and unpack the xNVMe source archive
      uses: xnvme/actions/.github/actions/setup-source@main
      id: source
      with:
        name: xnvme-src-archive

    - name: Retrieve the xNVMe Debian package repository by branch
      run: |
        git clone https://salsa.debian.org/safl/xnvme.git debpkg
        git -C debpkg checkout ${{ github.base_ref }}

    - name: Prep
      run: |
        cp ${{ steps.source.outputs.src_tgz }} debpkg/input/xnvme-0.7.5.tar.gz

    - name: Build
      run: |
        cd debpkg && make || true

    - name: Upload debian packages
      uses: actions/upload-artifact@v4.3.0
      with:
        name: packages-debian
        path: |
          debpkg/builddir/libxnvme*.deb
          debpkg/builddir/xnvme-cli*.deb
          debpkg/builddir/xnvme-full*.deb
          debpkg/builddir/*.dsc
          debpkg/builddir/*.buildinfo
          debpkg/builddir/*.changes

